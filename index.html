<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대형폐기물 원장 조회</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --blue:#1a56db;--blue-d:#1344b8;--blue-l:#e8f0fe;
  --red:#dc2626;--red-l:#fee2e2;
  --green:#16a34a;--green-l:#dcfce7;
  --yellow:#d97706;--yellow-l:#fef3c7;
  --purple:#7c3aed;--purple-l:#ede9fe;
  --orange:#ea580c;--orange-l:#ffedd5;
  --gray:#6b7280;--gray-l:#f3f4f6;
  --border:#e5e7eb;--text:#111827;--white:#fff;
  --font:'Noto Sans KR',-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:#f0f4f8;color:var(--text);min-height:100vh;}

/* ── Firebase 배너 ── */
.fb-setup{background:linear-gradient(135deg,#f59e0b,#d97706);padding:12px 20px;font-size:13px;color:#fff;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.fb-setup b{font-size:15px;}
.fb-setup code{background:rgba(0,0,0,.25);border-radius:4px;padding:2px 6px;font-size:12px;font-family:monospace;}
.fb-setup a{color:#fff;font-weight:700;}

/* ── 연결 상태 ── */
.conn-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);color:#fff;}
.conn-dot{width:8px;height:8px;border-radius:50%;background:#9ca3af;flex-shrink:0;}
.conn-dot.online{background:#4ade80;box-shadow:0 0 0 3px rgba(74,222,128,.3);}
.conn-dot.offline{background:#f87171;}
.conn-dot.loading{background:#fbbf24;animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── 헤더 ── */
.hdr{background:var(--blue);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.hdr-title{font-size:19px;font-weight:900;color:#fff;display:flex;align-items:center;gap:8px;}
.hdr-right{display:flex;align-items:center;gap:10px;}
.hdr-date{font-size:12px;color:rgba(255,255,255,.8);}
.btn-reset{background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4);color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);}
.btn-reset:hover{background:rgba(255,0,0,.3);}

/* ── 상단 패널 ── */
.top-panel{max-width:1400px;margin:20px auto 0;padding:0 16px;display:flex;gap:14px;flex-wrap:wrap;}

/* ── 업로드 카드 ── */
.upload-card{background:var(--white);border-radius:14px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08);flex:1;min-width:280px;}
.upload-card h3{font-size:14px;font-weight:700;color:var(--gray);margin-bottom:12px;}
.drop-zone{border:2.5px dashed var(--border);border-radius:12px;padding:20px 16px;text-align:center;cursor:pointer;transition:all .2s;}
.drop-zone:hover,.drop-zone.drag{border-color:var(--blue);background:var(--blue-l);}
.dz-icon{font-size:32px;margin-bottom:6px;}
.dz-title{font-size:14px;font-weight:700;margin-bottom:4px;}
.dz-sub{font-size:12px;color:var(--gray);}
.dz-btn{display:inline-block;margin-top:10px;padding:9px 22px;background:var(--blue);color:#fff;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:var(--font);}
.dz-btn:hover{background:var(--blue-d);}
#file-input{display:none;}

/* ── 누적 파일 폴더 트리 ── */
.files-card{background:var(--white);border-radius:14px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08);flex:2;min-width:300px;}
.files-card h3{font-size:14px;font-weight:700;color:var(--gray);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.folder-tree{display:flex;flex-direction:column;gap:6px;}
.folder-year{border:1.5px solid var(--purple);border-radius:10px;overflow:hidden;}
.folder-year-header{background:var(--purple-l);padding:8px 14px;font-size:13px;font-weight:700;color:var(--purple);cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none;}
.folder-year-header:hover{background:#ddd6fe;}
.toggle-icon{transition:transform .2s;font-size:10px;display:inline-block;}
.folder-year-header.open .toggle-icon{transform:rotate(90deg);}
.folder-months{padding:8px 10px;display:flex;flex-direction:column;gap:4px;}
.folder-months.hidden{display:none;}
.folder-month{border:1.5px solid var(--blue);border-radius:8px;overflow:hidden;}
.folder-month-header{background:var(--blue-l);padding:6px 12px;font-size:12px;font-weight:700;color:var(--blue);cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none;}
.folder-month-header:hover{background:#c7d8ff;}
.folder-month-header.open .toggle-icon{transform:rotate(90deg);}
.folder-days{padding:6px 8px;display:flex;flex-wrap:wrap;gap:5px;}
.folder-days.hidden{display:none;}
.day-tag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:16px;font-size:11px;font-weight:700;background:#f0f4f8;color:var(--gray);border:1.5px solid var(--border);cursor:pointer;transition:all .15s;}
.day-tag:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-l);}
.day-tag.on{background:var(--blue);border-color:var(--blue);color:#fff;}
.day-tag .del{opacity:.6;margin-left:2px;font-size:12px;}
.day-tag .del:hover{opacity:1;color:var(--red);}
.no-files{font-size:13px;color:var(--gray);padding:8px 0;}

/* ── 통계 ── */
.stats-bar{max-width:1400px;margin:14px auto 0;padding:0 16px;}
.stats-inner{display:flex;gap:10px;flex-wrap:wrap;}
.stat-card{background:var(--white);border-radius:10px;padding:10px 18px;box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;align-items:center;gap:10px;}
.stat-n{font-size:22px;font-weight:900;color:var(--blue);}
.stat-l{font-size:12px;color:var(--gray);}

/* ── 검색창 (수정: display:block으로 변경) ── */
.search-section{max-width:1400px;margin:16px auto 0;padding:0 16px; display: block;}
.search-card{background:var(--white);border-radius:14px;padding:16px 20px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.search-card-title{font-size:13px;font-weight:700;color:var(--gray);margin-bottom:10px;}
.search-row{display:flex;gap:10px;align-items:center;}
.search-input-wrap{flex:1;position:relative;}
.search-input{width:100%;border:2px solid var(--border);border-radius:10px;padding:11px 16px;font-size:15px;font-family:var(--font);outline:none;transition:border-color .15s;}
.search-input:focus{border-color:var(--blue);}
.search-btn{padding:11px 20px;background:var(--blue);border:none;border-radius:10px;font-size:14px;cursor:pointer;color:#fff;font-weight:700;font-family:var(--font);white-space:nowrap;}
.search-btn:hover{background:var(--blue-d);}
.search-clear{padding:11px 16px;background:var(--gray-l);border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);color:var(--gray);white-space:nowrap;}
.result-count{font-size:13px;color:var(--gray);white-space:nowrap;margin-top:6px; min-height: 1.2em;}

/* 드롭다운 자동완성 */
.ac-list{position:absolute;top:calc(100% + 2px);left:0;right:0;z-index:300;background:var(--white);border:2px solid var(--blue);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.14);max-height:280px;overflow-y:auto;display:none;}
.ac-list.show{display:block;}
.ac-item{padding:9px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover,.ac-item.focused{background:var(--blue-l);}
.ac-badge{font-size:10px;padding:2px 7px;border-radius:8px;background:var(--blue-l);color:var(--blue);font-weight:700;white-space:nowrap;}
.ac-badge.addr{background:var(--green-l);color:var(--green);}
.ac-badge.phone{background:var(--yellow-l);color:var(--yellow);}
.ac-text mark{background:#fef08a;border-radius:2px;padding:0 1px;}

/* ── 탭 ── */
.tab-section{max-width:1400px;margin:14px auto 0;padding:0 16px; display: block;}
.tab-row{display:flex;gap:5px;flex-wrap:wrap; min-height: 38px;}
.tab{padding:9px 18px;border-radius:10px 10px 0 0;border:none;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;background:rgba(255,255,255,.5);color:var(--gray);transition:all .15s;}
.tab.on{background:var(--white);color:var(--blue);box-shadow:0 -2px 8px rgba(0,0,0,.08);}
.tab-badge{display:inline-block;margin-left:5px;padding:1px 7px;border-radius:10px;background:var(--blue-l);color:var(--blue);font-size:11px;}
.tab.on .tab-badge{background:var(--blue);color:#fff;}

/* 아파트 서브탭 */
.subtab-row{background:var(--white);border-radius:0 12px 0 0;padding:8px 14px 0;display:flex;gap:4px;flex-wrap:wrap;border-bottom:2px solid var(--blue-l);display:none;}
.subtab-row.show{display:flex;}
.subtab{padding:5px 14px;border-radius:8px 8px 0 0;border:none;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;background:var(--gray-l);color:var(--gray);transition:all .15s;}
.subtab.on{background:var(--blue-l);color:var(--blue);}

/* ── 테이블 ── */
.table-section{max-width:1400px;margin:0 auto;padding:0 16px 40px; display: block;}
.table-box{background:var(--white);border-radius:0 12px 12px 12px;box-shadow:0 2px 12px rgba(0,0,0,.08);overflow:auto;max-height:calc(100vh - 340px); min-height: 200px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{background:var(--blue);color:#fff;}
thead th{padding:10px 12px;text-align:center;white-space:nowrap;font-weight:700;font-size:12px;position:sticky;top:0;z-index:5;}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:nth-child(even){background:#fafafa;}
tbody tr:hover{background:var(--blue-l);}
td{padding:8px 12px;vertical-align:middle;white-space:nowrap;}
td.wrap{white-space:normal;min-width:80px;max-width:160px;word-break:keep-all;}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;white-space:nowrap;}
.badge-done{background:var(--green-l);color:var(--green);}
.badge-wait{background:var(--yellow-l);color:var(--yellow);}
.badge-none{background:var(--gray-l);color:var(--gray);}
.badge-date{background:var(--purple-l);color:var(--purple);}
mark{background:#fef08a;border-radius:2px;padding:0 2px;}

/* ── 빈 상태 ── */
.empty{text-align:center;padding:60px 20px;color:var(--gray);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-text{font-size:16px;font-weight:700;}
.empty-sub{font-size:13px;margin-top:6px;}

/* ── 토스트 ── */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:11px 22px;border-radius:12px;font-size:14px;font-weight:700;z-index:999;display:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.3);}

/* ── 로딩 ── */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.loading-overlay.hidden{display:none;}
.spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;font-weight:700;color:var(--gray);}

@media(max-width:600px){
  .hdr-title{font-size:15px;}
  .tab{padding:7px 10px;font-size:12px;}
  table{font-size:12px;}
  td,thead th{padding:6px 8px;}
}
</style>
</head>
<body>

<div class="fb-setup" id="fb-setup-banner">
  <b>⚠️ Firebase 설정 필요</b>
  아래 <code>firebaseConfig</code>를 실제 값으로 교체하세요.
</div>

<div class="hdr">
  <div class="hdr-title">📋 대형폐기물 원장 조회</div>
  <div class="hdr-right">
    <div class="hdr-date" id="hdr-date"></div>
    <div class="conn-badge">
      <span class="conn-dot loading" id="conn-dot"></span>
      <span id="conn-text">연결 중…</span>
    </div>
    <button class="btn-reset" onclick="confirmReset()">🗑 전체 초기화</button>
  </div>
</div>

<div class="top-panel">
  <div class="upload-card">
    <h3>📂 원장 파일 추가 업로드</h3>
    <div class="drop-zone" id="drop-zone">
      <div class="dz-icon">📁</div>
      <div class="dz-title">파일을 여기에 드래그하세요</div>
      <div class="dz-sub">XLSX 파일을 선택하거나 드래그하세요</div>
      <button class="dz-btn" onclick="document.getElementById('file-input').click()">📁 파일 선택</button>
      <input type="file" id="file-input" accept=".xlsx,.xls" multiple>
    </div>
  </div>

  <div class="files-card">
    <h3>
      <span>📅 누적된 원장 파일 <span id="files-count" style="color:var(--blue)">0</span>개</span>
    </h3>
    <div class="folder-tree" id="folder-tree">
      <div class="no-files">불러오는 중...</div>
    </div>
  </div>
</div>

<div class="stats-bar" id="stats-bar">
  <div class="stats-inner" id="stats-inner"></div>
</div>

<div class="search-section" id="search-section">
  <div class="search-card">
    <div class="search-card-title">🔍 통합 검색 (이름 · 주소 · 전화번호)</div>
    <div class="search-row">
      <div class="search-input-wrap">
        <input type="text" class="search-input" id="search-input"
          placeholder="이름, 주소, 전화번호를 입력하세요"
          autocomplete="off"
          oninput="onSearchInput()"
          onkeydown="onSearchKeydown(event)">
        <div class="ac-list" id="ac-list"></div>
      </div>
      <button class="search-btn" onclick="doSearch()">🔍 검색</button>
      <button class="search-clear" onclick="clearSearch()">✕ 초기화</button>
    </div>
    <div class="result-count" id="result-count"></div>
  </div>
</div>

<div class="tab-section" id="tab-section">
  <div class="tab-row" id="tab-row"></div>
  <div class="subtab-row" id="subtab-row"></div>
</div>

<div class="table-section" id="table-section">
  <div class="table-box" id="table-box">
    <div class="empty">
      <div class="empty-icon">📂</div>
      <div class="empty-text">데이터를 불러오는 중입니다...</div>
    </div>
  </div>
</div>

<div class="loading-overlay hidden" id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">처리 중…</div>
</div>
<div class="toast" id="toast"></div>

<script>
// Firebase 설정 (사용자님의 키 그대로 유지)
const firebaseConfig = {
  apiKey: "AIzaSyD4hPKN8cdtnsVACdvBxDfoR33mAOYEuco",
  authDomain: "boneco-wonjang.firebaseapp.com",
  databaseURL: "https://boneco-wonjang-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "boneco-wonjang",
  storageBucket: "boneco-wonjang.firebasestorage.app",
  messagingSenderId: "463413861191",
  appId: "1:463413861191:web:c6a68b67fe000baae64a62",
  measurementId: "G-KB10ZSCQN5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const DB_PATH = 'wongjang_data';

const MAIN_TABS = ['잠실본동', '삼전동', '아파트'];
const APT_SUBS = [
  { key: '5단지',    label: '5단지아파트' },
  { key: '우성4차',  label: '우성4차아파트' },
  { key: '트리지움', label: '트리지움아파트' },
  { key: '레이크',   label: '레이크팰리스아파트' },
  { key: '잠실현대', label: '잠실현대아파트' },
  { key: '삼전현대', label: '삼전현대아파트' },
  { key: '가락',     label: '가락시장' },
];

let allData = {};
let curTab = '잠실본동';
let curAptSub = '5단지';
let curDateFilter = 'all';
let isSearchMode = false;
let curSearch = '';
let acFocusIdx = -1;

window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('hdr-date').textContent = new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric'});
  
  // 외부 클릭 시 검색 목록 닫기
  document.addEventListener('click', e => {
    if (!e.target.closest('.search-input-wrap')) hideAcList();
  });

  db.ref('.info/connected').on('value', snap => {
    setConnStatus(snap.val() ? 'online' : 'offline', snap.val() ? '실시간 연결됨' : '연결 끊김');
  });

  // 데이터 실시간 수신
  db.ref(DB_PATH).on('value', snap => {
    allData = snap.val() || {};
    renderAll();
  });
});

function setConnStatus(state, label) {
  document.getElementById('conn-dot').className = 'conn-dot ' + state;
  document.getElementById('conn-text').textContent = label;
}

function renderAll() {
  renderFolderTree();
  renderStats();
  renderTabs();
  
  // 데이터가 없을 때의 화면 처리
  if (Object.keys(allData).length === 0) {
    document.getElementById('table-box').innerHTML = `
      <div class="empty"><div class="empty-icon">📂</div>
      <div class="empty-text">아직 업로드된 원장이 없습니다</div>
      <div class="empty-sub">상단의 업로드 구역에서 파일을 추가해주세요</div></div>`;
  }
}

// 나머지 함수들은 기존 로직을 유지하되 가시성 문제를 해결함
function renderFolderTree() {
  const dates = Object.keys(allData).sort();
  document.getElementById('files-count').textContent = dates.length;
  const tree = document.getElementById('folder-tree');
  if (!dates.length) {
    tree.innerHTML = '<div class="no-files">파일을 업로드하면 여기에 표시됩니다.</div>';
    return;
  }
  
  // 폴더 구조 생성 (기존 로직 동일)
  let html = '';
  const struct = {};
  dates.forEach(d => {
    const [y, mo] = d.split('-');
    if (!struct[y]) struct[y] = {};
    if (!struct[y][mo]) struct[y][mo] = [];
    struct[y][mo].push(d);
  });

  Object.keys(struct).sort().reverse().forEach(y => {
    html += `<div class="folder-year">
      <div class="folder-year-header open" onclick="this.parentElement.querySelector('.folder-months').classList.toggle('hidden')">
        <span class="toggle-icon">▶</span> 📁 ${y}년
      </div>
      <div class="folder-months">`;
    Object.keys(struct[y]).sort().reverse().forEach(mo => {
      html += `<div class="folder-month">
        <div class="folder-month-header open" onclick="this.parentElement.querySelector('.folder-days').classList.toggle('hidden')">
          <span class="toggle-icon">▶</span> 📂 ${parseInt(mo)}월
        </div>
        <div class="folder-days">`;
      struct[y][mo].sort().reverse().forEach(d => {
        const isOn = curDateFilter === d ? 'on' : '';
        html += `<span class="day-tag ${isOn}" onclick="selectDate('${d}')">📄 ${d.slice(5)} <span class="del" onclick="deleteDate(event,'${d}')">✕</span></span>`;
      });
      html += `</div></div>`;
    });
    html += `</div></div>`;
  });
  tree.innerHTML = html;
}

function selectDate(d) {
  curDateFilter = (curDateFilter === d) ? 'all' : d;
  isSearchMode = false;
  renderAll();
}

function renderTabs() {
  if (isSearchMode) return;
  const tabRow = document.getElementById('tab-row');
  tabRow.innerHTML = MAIN_TABS.map(t => `<button class="tab ${t===curTab?'on':''}" onclick="switchTab('${t}')">${t}</button>`).join('');

  const subRow = document.getElementById('subtab-row');
  if (curTab === '아파트') {
    subRow.className = 'subtab-row show';
    subRow.innerHTML = APT_SUBS.map(s => `<button class="subtab ${s.key===curAptSub?'on':''}" onclick="switchAptSub('${s.key}')">${s.label}</button>`).join('');
  } else {
    subRow.className = 'subtab-row';
  }
  renderTable();
}

function switchTab(t) { curTab = t; renderTabs(); }
function switchAptSub(k) { curAptSub = k; renderTabs(); }

function renderTable() {
  if (isSearchMode) return;
  const box = document.getElementById('table-box');
  const rows = [];
  Object.keys(allData).forEach(d => {
    if (curDateFilter !== 'all' && d !== curDateFilter) return;
    const dayData = allData[d];
    if (curTab === '아파트') {
      if (dayData['아파트'] && dayData['아파트'][curAptSub]) rows.push(...dayData['아파트'][curAptSub]);
    } else {
      if (dayData[curTab]) rows.push(...dayData[curTab]);
    }
  });

  if (rows.length === 0) {
    box.innerHTML = `<div class="empty"><div class="empty-text">해당 카테고리에 데이터가 없습니다.</div></div>`;
    return;
  }

  const cols = ['_date','연번','접수일자','주소','성명','전화번호','품목1','총금액','입금일자','수거일자','비고'];
  let html = `<table><thead><tr>${cols.map(c=>`<th>${c==='_date'?'날짜':c}</th>`).join('')}</tr></thead><tbody>`;
  rows.forEach(r => {
    html += `<tr>${cols.map(c => {
      let val = r[c] || '';
      if (c === '입금일자') val = val ? `<span class="badge badge-done">💰 ${val}</span>` : `<span class="badge badge-wait">미입금</span>`;
      if (c === '수거일자') val = val ? `<span class="badge badge-done">✅ ${val}</span>` : `<span class="badge badge-none">미수거</span>`;
      return `<td>${val}</td>`;
    }).join('')}</tr>`;
  });
  html += `</tbody></table>`;
  box.innerHTML = html;
}

// 검색 기능 개선
function onSearchInput() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) { hideAcList(); return; }
  
  const allRows = getAllRows();
  const suggestions = new Set();
  allRows.forEach(r => {
    if (r.성명.includes(q)) suggestions.add(r.성명);
    if (r.주소.includes(q)) suggestions.add(r.주소);
    if (r.전화번호.includes(q)) suggestions.add(r.전화번호);
  });

  const list = document.getElementById('ac-list');
  if (suggestions.size > 0) {
    list.innerHTML = Array.from(suggestions).slice(0, 10).map(s => `<div class="ac-item" onclick="selectAc('${s}')">${s}</div>`).join('');
    list.classList.add('show');
  } else {
    hideAcList();
  }
}

function selectAc(val) {
  document.getElementById('search-input').value = val;
  hideAcList();
  doSearch();
}

function hideAcList() { document.getElementById('ac-list').classList.remove('show'); }

function doSearch() {
  curSearch = document.getElementById('search-input').value.trim();
  if (!curSearch) return;
  isSearchMode = true;
  hideAcList();
  
  const allRows = getAllRows();
  const matched = allRows.filter(r => 
    r.성명.includes(curSearch) || r.주소.includes(curSearch) || r.전화번호.includes(curSearch)
  );

  const box = document.getElementById('table-box');
  document.getElementById('tab-row').innerHTML = '';
  document.getElementById('subtab-row').classList.remove('show');

  if (matched.length === 0) {
    box.innerHTML = `<div class="empty"><div class="empty-text">"${curSearch}" 검색 결과가 없습니다.</div></div>`;
  } else {
    // 검색 결과 테이블 렌더링 (기존 buildRow 활용)
    const cols = ['_date','주소','성명','전화번호','품목1','총금액','수거일자'];
    let html = `<table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>`;
    matched.forEach(r => {
      html += `<tr>${cols.map(c => `<td>${r[c]||''}</td>`).join('')}</tr>`;
    });
    html += `</tbody></table>`;
    box.innerHTML = html;
  }
  document.getElementById('result-count').textContent = `🔍 ${matched.length}건 찾음`;
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('result-count').textContent = '';
  isSearchMode = false;
  renderAll();
}

function getAllRows() {
  const rows = [];
  Object.keys(allData).forEach(d => {
    const day = allData[d];
    ['잠실본동', '삼전동'].forEach(s => { if(day[s]) rows.push(...day[s]); });
    if (day['아파트']) Object.values(day['아파트']).forEach(arr => rows.push(...arr));
  });
  return rows;
}

// 파일 처리 및 기타 함수는 기존 유지...
function showLoading(msg) { document.getElementById('loading-overlay').classList.remove('hidden'); }
function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.style.display='block'; setTimeout(()=>t.style.display='none', 3000); }

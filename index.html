<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대형폐기물 원장 조회</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --blue:#1a56db;--blue-d:#1344b8;--blue-l:#e8f0fe;
  --red:#dc2626;--red-l:#fee2e2;
  --green:#16a34a;--green-l:#dcfce7;
  --yellow:#d97706;--yellow-l:#fef3c7;
  --purple:#7c3aed;--purple-l:#ede9fe;
  --gray:#6b7280;--gray-l:#f3f4f6;
  --border:#e5e7eb;--text:#111827;--white:#fff;
  --font:'Noto Sans KR',-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:#f0f4f8;color:var(--text);min-height:100vh;}

/* 헤더 */
.hdr{background:var(--blue);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.hdr-title{font-size:19px;font-weight:900;color:#fff;display:flex;align-items:center;gap:8px;}
.hdr-right{display:flex;align-items:center;gap:10px;}
.hdr-date{font-size:12px;color:rgba(255,255,255,.8);}
.btn-reset{background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4);color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);}
.btn-reset:hover{background:rgba(255,0,0,.3);}

/* 업로드 + 누적 현황 */
.top-panel{max-width:1400px;margin:20px auto 0;padding:0 16px;display:flex;gap:14px;flex-wrap:wrap;}

.upload-card{background:var(--white);border-radius:14px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08);flex:1;min-width:280px;}
.upload-card h3{font-size:14px;font-weight:700;color:var(--gray);margin-bottom:12px;}
.drop-zone{
  border:2.5px dashed var(--border);border-radius:12px;
  padding:20px 16px;text-align:center;cursor:pointer;transition:all .2s;
}
.drop-zone:hover,.drop-zone.drag{border-color:var(--blue);background:var(--blue-l);}
.dz-icon{font-size:32px;margin-bottom:6px;}
.dz-title{font-size:14px;font-weight:700;margin-bottom:4px;}
.dz-sub{font-size:12px;color:var(--gray);}
.dz-btn{
  display:inline-block;margin-top:10px;padding:9px 22px;
  background:var(--blue);color:#fff;border-radius:9px;
  font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:var(--font);
}
.dz-btn:hover{background:var(--blue-d);}
#file-input{display:none;}

/* 누적 파일 목록 */
.files-card{background:var(--white);border-radius:14px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08);flex:2;min-width:300px;}
.files-card h3{font-size:14px;font-weight:700;color:var(--gray);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.file-tags{display:flex;flex-wrap:wrap;gap:7px;}
.file-tag{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;
  background:var(--blue-l);color:var(--blue);border:1.5px solid var(--blue);cursor:pointer;
}
.file-tag.on{background:var(--blue);color:#fff;}
.file-tag .del{font-size:14px;opacity:.7;margin-left:2px;}
.file-tag .del:hover{opacity:1;color:var(--red);}
.no-files{font-size:13px;color:var(--gray);padding:8px 0;}

/* 통계 */
.stats-bar{max-width:1400px;margin:14px auto 0;padding:0 16px;display:none;}
.stats-inner{display:flex;gap:10px;flex-wrap:wrap;}
.stat-card{background:var(--white);border-radius:10px;padding:10px 18px;box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;align-items:center;gap:10px;}
.stat-n{font-size:22px;font-weight:900;color:var(--blue);}
.stat-l{font-size:12px;color:var(--gray);}

/* 검색 */
.search-wrap{max-width:1400px;margin:14px auto 0;padding:0 16px;display:none;}
.search-box{background:var(--white);border-radius:12px;padding:12px 16px;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.search-input{flex:1;min-width:200px;border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-size:15px;font-family:var(--font);outline:none;}
.search-input:focus{border-color:var(--blue);}
.search-clear{padding:10px 16px;background:var(--gray-l);border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);color:var(--gray);}
.result-count{font-size:13px;color:var(--gray);white-space:nowrap;}

/* 월별 필터 */
.filter-wrap{max-width:1400px;margin:12px auto 0;padding:0 16px;display:none;}
.filter-inner{background:var(--white);border-radius:12px;padding:12px 16px;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.filter-label{font-size:13px;font-weight:700;color:var(--gray);margin-right:4px;}
.filter-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);color:var(--gray);transition:all .15s;}
.filter-btn:hover{border-color:var(--blue);color:var(--blue);}
.filter-btn.on{background:var(--blue);border-color:var(--blue);color:#fff;}
.filter-btn.year-btn{background:var(--purple-l);border-color:var(--purple);color:var(--purple);font-size:13px;}
.filter-btn.year-btn.on{background:var(--purple);color:#fff;}
.filter-btn.month-btn{font-size:12px;color:var(--blue);}
.filter-btn.day-btn{font-size:11px;color:var(--gray);}

/* 탭 */
.tab-wrap{max-width:1400px;margin:12px auto 0;padding:0 16px;display:none;}
.tabs{display:flex;gap:5px;}
.tab{padding:9px 20px;border-radius:10px 10px 0 0;border:none;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;background:rgba(255,255,255,.5);color:var(--gray);transition:all .15s;}
.tab.on{background:var(--white);color:var(--blue);box-shadow:0 -2px 8px rgba(0,0,0,.08);}
.tab-badge{display:inline-block;margin-left:5px;padding:1px 7px;border-radius:10px;background:var(--blue-l);color:var(--blue);font-size:11px;}
.tab.on .tab-badge{background:var(--blue);color:#fff;}

/* 테이블 */
.table-wrap{max-width:1400px;margin:0 auto;padding:0 16px 40px;display:none;}
.table-box{background:var(--white);border-radius:0 12px 12px 12px;box-shadow:0 2px 12px rgba(0,0,0,.08);overflow:auto;max-height:calc(100vh - 320px);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{background:var(--blue);color:#fff;}
thead th{padding:10px 12px;text-align:center;white-space:nowrap;font-weight:700;font-size:12px;position:sticky;top:0;z-index:5;}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:nth-child(even){background:#fafafa;}
tbody tr:hover{background:var(--blue-l);}
tbody tr.hidden{display:none;}
tbody tr.highlight{background:#fffbeb;}
td{padding:8px 12px;vertical-align:middle;white-space:nowrap;}
td.wrap{white-space:normal;min-width:80px;max-width:160px;word-break:keep-all;}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;white-space:nowrap;}
.badge-done{background:var(--green-l);color:var(--green);}
.badge-wait{background:var(--yellow-l);color:var(--yellow);}
.badge-none{background:var(--gray-l);color:var(--gray);}
.badge-date{background:var(--purple-l);color:var(--purple);}
mark{background:#fef08a;border-radius:2px;padding:0 2px;}

/* 날짜 컬럼 강조 */
td.col-date{font-size:12px;color:var(--purple);font-weight:700;}

/* 빈 상태 */
.empty{text-align:center;padding:60px 20px;color:var(--gray);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-text{font-size:16px;font-weight:700;}
.empty-sub{font-size:13px;margin-top:6px;}

/* 토스트 */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:11px 22px;border-radius:12px;font-size:14px;font-weight:700;z-index:999;display:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.3);}

@media(max-width:600px){
  .hdr-title{font-size:15px;}
  .tab{padding:7px 12px;font-size:12px;}
  table{font-size:12px;}
  td,thead th{padding:6px 8px;}
  .stat-n{font-size:18px;}
}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="hdr">
  <div class="hdr-title">📋 대형폐기물 원장 조회</div>
  <div class="hdr-right">
    <div class="hdr-date" id="hdr-date"></div>
    <button class="btn-reset" onclick="confirmReset()">🗑 전체 초기화</button>
  </div>
</div>

<!-- 상단 패널 -->
<div class="top-panel">

  <!-- 업로드 카드 -->
  <div class="upload-card">
    <h3>📂 원장 파일 추가 업로드</h3>
    <div class="drop-zone" id="drop-zone">
      <div class="dz-icon">📁</div>
      <div class="dz-title">파일을 여기에 드래그하세요</div>
      <div class="dz-sub">날짜별로 누적 저장됩니다</div>
      <button class="dz-btn" onclick="document.getElementById('file-input').click()">📁 파일 선택</button>
      <input type="file" id="file-input" accept=".xlsx,.xls" multiple>
    </div>
  </div>

  <!-- 누적 파일 목록 카드 -->
  <div class="files-card">
    <h3>
      <span>📅 누적된 원장 파일 <span id="files-count" style="color:var(--blue)">0</span>개</span>
      <span style="font-size:11px;color:var(--gray);font-weight:400;">클릭하면 해당 날짜만 보기</span>
    </h3>
    <div class="file-tags" id="file-tags">
      <div class="no-files">아직 업로드된 파일이 없습니다.<br>위에서 파일을 올려주세요.</div>
    </div>
  </div>
</div>

<!-- 통계 -->
<div class="stats-bar" id="stats-bar">
  <div class="stats-inner" id="stats-inner"></div>
</div>

<!-- 검색 -->
<div class="search-wrap" id="search-wrap">
  <div class="search-box">
    <input type="text" class="search-input" id="search-input"
      placeholder="🔍  이름 · 주소 · 전화번호 · 품목 입력 → 날짜 상관없이 전체 누적 원장에서 통합 검색"
      oninput="doSearch()">
    <button class="search-clear" onclick="clearSearch()">✕ 초기화</button>
    <span class="result-count" id="result-count"></span>
  </div>
</div>

<!-- 월별/날짜 필터 -->
<div class="filter-wrap" id="filter-wrap">
  <div class="filter-inner" id="filter-inner">
    <span class="filter-label">📅 날짜 필터:</span>
  </div>
</div>

<!-- 탭 -->
<div class="tab-wrap" id="tab-wrap">
  <div class="tabs" id="tabs"></div>
</div>

<!-- 테이블 -->
<div class="table-wrap" id="table-wrap">
  <div class="table-box" id="table-box">
    <div class="empty">
      <div class="empty-icon">📂</div>
      <div class="empty-text">파일을 업로드하면 여기에 표시됩니다</div>
      <div class="empty-sub">날짜별로 여러 파일을 올리면 자동으로 누적됩니다</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══ 설정 ══
const KEEP_SHEETS = ['잠실본동', '삼전동', '아파트'];
const STORAGE_KEY = 'wongjang_data_v2';

// ══ 상태 ══
// allData 구조: { '2026-04-01': { '잠실본동': [...rows], '삼전동': [...], ... }, '2026-04-02': {...}, ... }
let allData = {};
let curTab = '잠실본동';
let curSearch = '';
let curDateFilter = 'all'; // 'all' 또는 특정 날짜 'YYYY-MM-DD'
let selectedFileDates = new Set(); // 파일 태그 선택 상태 (빈 셋 = 전체)

// ══ 초기화 ══
window.addEventListener('DOMContentLoaded', () => {
  loadFromStorage();
  document.getElementById('hdr-date').textContent =
    new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric'});
  renderAll();
});

// ══ localStorage ══
function saveToStorage() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(allData)); } catch(e) {
    showToast('⚠️ 저장 공간이 부족합니다. 오래된 날짜를 삭제해 주세요.');
  }
}
function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) allData = JSON.parse(raw);
  } catch(e) { allData = {}; }
}

// ══ 파일 업로드 이벤트 ══
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag');
  [...e.dataTransfer.files].forEach(f => processFile(f));
});
fileInput.addEventListener('change', e => {
  [...e.target.files].forEach(f => processFile(f));
  e.target.value = '';
});

// ══ 엑셀 파일 처리 ══
function processFile(file) {
  // 파일명에서 날짜 추출: "2026년 4월 2일..." → "2026-04-02"
  const dateKey = extractDateFromFilename(file.name);

  const reader = new FileReader();
  reader.onload = function(e) {
    const wb = XLSX.read(e.target.result, { type: 'binary', cellDates: true });
    const dateData = {};

    KEEP_SHEETS.forEach(sheetName => {
      if (!wb.SheetNames.includes(sheetName)) return;
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, {
        header: 1, defval: '', raw: false, dateNF: 'yyyy-mm-dd'
      });
      const data = [];
      for (let i = 3; i < rows.length; i += 2) {
        const r = rows[i];
        const name = String(r[4] || '').trim();
        const addr = String(r[3] || '').trim();
        if (!name && !addr) continue;
        const fmtDate = v => {
          if (!v) return '';
          const s = String(v);
          return (s.includes('-') || s.includes('/')) ? s.slice(0,10) : s;
        };
        data.push({
          _date: dateKey,    // 원장 날짜 (출처 추적용)
          연번:    String(r[0]||'').trim(),
          접수자:  String(r[1]||'').trim(),
          접수일자: fmtDate(r[2]),
          주소:    addr,
          성명:    name,
          전화번호: String(r[5]||'').trim(),
          품목1:   String(r[6]||'').trim(),
          금액1:   fmtMoney(r[7]),
          품목2:   String(r[8]||'').trim(),
          금액2:   fmtMoney(r[9]),
          총금액:  fmtMoney(r[12]),
          입금일자: fmtDate(r[13]),
          수거일자: fmtDate(r[14]),
          수거원:  String(r[15]||'').trim(),
          비고:    String(r[16]||'').trim(),
        });
      }
      if (data.length > 0) dateData[sheetName] = data;
    });

    // 누적 저장 (같은 날짜면 덮어쓰기)
    allData[dateKey] = dateData;
    saveToStorage();
    renderAll();

    const totalRows = Object.values(dateData).reduce((s,a) => s+a.length, 0);
    showToast(`✅ [${dateKey}] 원장 추가 완료 — 총 ${totalRows}건`);
  };
  reader.readAsBinaryString(file);
}

function extractDateFromFilename(name) {
  // "2026년 4월 2일" 또는 "2026-04-02" 형태 모두 처리
  const m1 = name.match(/(\d{4})[년\-\/\.]?\s*(\d{1,2})[월\-\/\.]?\s*(\d{1,2})/);
  if (m1) {
    const y = m1[1], mo = m1[2].padStart(2,'0'), d = m1[3].padStart(2,'0');
    return `${y}-${mo}-${d}`;
  }
  // 못 찾으면 오늘 날짜
  return new Date().toISOString().slice(0,10);
}

function fmtMoney(v) {
  if (!v && v !== 0) return '';
  const n = parseFloat(String(v).replace(/,/g,''));
  return isNaN(n) ? String(v) : n.toLocaleString() + '원';
}

// ══ 전체 렌더 ══
function renderAll() {
  renderFileTags();
  renderDateFilters();
  renderTabs();
  renderStats();
  const hasDates = Object.keys(allData).length > 0;
  ['search-wrap','stats-bar','filter-wrap','tab-wrap','table-wrap'].forEach(id => {
    document.getElementById(id).style.display = hasDates ? '' : 'none';
  });
}

// ══ 파일 태그 렌더 ══
function renderFileTags() {
  const dates = Object.keys(allData).sort();
  document.getElementById('files-count').textContent = dates.length;
  const wrap = document.getElementById('file-tags');
  if (!dates.length) {
    wrap.innerHTML = '<div class="no-files">아직 업로드된 파일이 없습니다.<br>위에서 파일을 올려주세요.</div>';
    return;
  }
  wrap.innerHTML = dates.map(d => {
    const cnt = Object.values(allData[d]).reduce((s,a)=>s+a.length,0);
    const on = selectedFileDates.size === 0 || selectedFileDates.has(d) ? 'on' : '';
    return `<span class="file-tag ${on}" onclick="toggleFileDate('${d}')">
      📅 ${d} <span style="font-weight:400;opacity:.8">(${cnt}건)</span>
      <span class="del" onclick="deleteDate(event,'${d}')">✕</span>
    </span>`;
  }).join('');
}

function toggleFileDate(d) {
  if (selectedFileDates.has(d)) {
    selectedFileDates.delete(d);
  } else {
    selectedFileDates.add(d);
  }
  // 전체 선택 해제 → 해당 날짜만
  renderFileTags();
  renderDateFilters();
  renderTabs();
  renderStats();
  renderTable();
}

function deleteDate(e, d) {
  e.stopPropagation();
  if (!confirm(`[${d}] 원장 데이터를 삭제하시겠습니까?`)) return;
  delete allData[d];
  selectedFileDates.delete(d);
  saveToStorage();
  renderAll();
  showToast(`🗑 [${d}] 삭제 완료`);
}

// ══ 날짜 필터 버튼 ══
function renderDateFilters() {
  const inner = document.getElementById('filter-inner');
  const activeDates = getActiveDates();

  // 연도 → 월 → 일 3단계 그룹핑
  const years = {};
  activeDates.forEach(d => {
    const [y, mo] = d.split('-');
    if (!years[y]) years[y] = {};
    if (!years[y][mo]) years[y][mo] = [];
    years[y][mo].push(d);
  });

  let html = '<span class="filter-label">📅 날짜 필터:</span>';
  html += `<button class="filter-btn ${curDateFilter==='all'?'on':''}" onclick="setDateFilter('all')">전체</button>`;

  Object.keys(years).sort().forEach(y => {
    // 연도 전체 버튼
    html += `<button class="filter-btn year-btn ${curDateFilter===y?'on':''}"
      onclick="setDateFilter('${y}')">📁 ${y}년</button>`;

    Object.keys(years[y]).sort().forEach(mo => {
      const monthKey = `${y}-${mo}`;
      // 월 전체 버튼
      html += `<button class="filter-btn month-btn ${curDateFilter===monthKey?'on':''}"
        onclick="setDateFilter('${monthKey}')">&nbsp;&nbsp;└ ${parseInt(mo)}월 전체</button>`;

      // 일별 버튼
      years[y][mo].sort().forEach(d => {
        const day = d.slice(8).replace(/^0/,'');
        html += `<button class="filter-btn day-btn ${curDateFilter===d?'on':''}"
          onclick="setDateFilter('${d}')">&nbsp;&nbsp;&nbsp;&nbsp;∟ ${parseInt(mo)}/${day}</button>`;
      });
    });
  });

  inner.innerHTML = html;
}

function setDateFilter(val) {
  curDateFilter = val;
  renderDateFilters();
  renderTable();
  updateCount();
}

// ══ 활성 날짜 목록 (파일 선택 필터 적용) ══
function getActiveDates() {
  const all = Object.keys(allData).sort();
  if (selectedFileDates.size === 0) return all;
  return all.filter(d => selectedFileDates.has(d));
}

// ══ 현재 시트+날짜 필터 기준 행 목록 ══
function getFilteredRows() {
  const dates = getActiveDates();
  const rows = [];
  dates.forEach(d => {
    // 날짜 필터 (연도 4자리 / 월 7자리 YYYY-MM / 일 10자리 YYYY-MM-DD)
    if (curDateFilter !== 'all') {
      if (curDateFilter.length === 4 && !d.startsWith(curDateFilter)) return;   // 연도
      if (curDateFilter.length === 7 && !d.startsWith(curDateFilter)) return;   // 월
      if (curDateFilter.length === 10 && d !== curDateFilter) return;            // 일
    }
    const sheetData = allData[d]?.[curTab] || [];
    rows.push(...sheetData);
  });
  return rows;
}

// ══ 탭 렌더 ══
function renderTabs() {
  const tabs = document.getElementById('tabs');
  const dates = getActiveDates();

  // 시트별 행 수 계산
  const counts = {};
  KEEP_SHEETS.forEach(s => {
    counts[s] = 0;
    dates.forEach(d => {
      if (curDateFilter !== 'all') {
        if (curDateFilter.length === 4 && !d.startsWith(curDateFilter)) return;
        if (curDateFilter.length === 7 && !d.startsWith(curDateFilter)) return;
        if (curDateFilter.length === 10 && d !== curDateFilter) return;
      }
      counts[s] += (allData[d]?.[s] || []).length;
    });
  });

  tabs.innerHTML = KEEP_SHEETS.map(s => `
    <button class="tab ${s===curTab?'on':''}" onclick="switchTab('${s}')">
      ${s} <span class="tab-badge">${counts[s]}</span>
    </button>`).join('');

  renderTable();
}

function switchTab(name) {
  curTab = name;
  renderTabs();
}

// ══ 통계 렌더 ══
function renderStats() {
  const dates = getActiveDates();
  let total=0, paid=0, done=0;
  KEEP_SHEETS.forEach(s => {
    dates.forEach(d => {
      (allData[d]?.[s]||[]).forEach(r => {
        total++;
        if (r.입금일자) paid++;
        if (r.수거일자) done++;
      });
    });
  });

  document.getElementById('stats-inner').innerHTML = `
    <div class="stat-card"><div class="stat-n">${total}</div><div class="stat-l">전체 건수</div></div>
    <div class="stat-card"><div class="stat-n" style="color:var(--green)">${paid}</div><div class="stat-l">입금 완료</div></div>
    <div class="stat-card"><div class="stat-n" style="color:var(--blue)">${done}</div><div class="stat-l">수거 완료</div></div>
    <div class="stat-card"><div class="stat-n" style="color:var(--red)">${total-done}</div><div class="stat-l">수거 미완료</div></div>
    <div class="stat-card"><div class="stat-n" style="color:var(--purple)">${Object.keys(allData).length}</div><div class="stat-l">누적 파일 수</div></div>
  `;
}

// ══ 테이블 렌더 ══
const COLS = ['_date','연번','접수자','접수일자','주소','성명','전화번호',
  '품목1','금액1','품목2','금액2','총금액','입금일자','수거일자','수거원','비고'];
const COL_LABELS = {'_date':'원장날짜','연번':'연번','접수자':'접수자','접수일자':'접수일',
  '주소':'주소','성명':'성명','전화번호':'전화번호','품목1':'품목1','금액1':'금액1',
  '품목2':'품목2','금액2':'금액2','총금액':'총금액','입금일자':'입금일자',
  '수거일자':'수거일자','수거원':'수거원','비고':'비고'};

function renderTable() {
  const box = document.getElementById('table-box');
  const rows = getFilteredRows();

  if (!rows.length) {
    box.innerHTML = `<div class="empty">
      <div class="empty-icon">🗂</div>
      <div class="empty-text">조건에 맞는 데이터가 없습니다</div>
      <div class="empty-sub">날짜 필터 또는 탭을 변경해 보세요</div>
    </div>`;
    updateCount();
    return;
  }

  const thead = `<thead><tr>${COLS.map(c=>`<th>${COL_LABELS[c]}</th>`).join('')}</tr></thead>`;
  const tbody = `<tbody id="tbody">${rows.map((r,i)=>buildRow(r,i)).join('')}</tbody>`;
  box.innerHTML = `<table>${thead}${tbody}</table>`;
  applySearch(curSearch);
  updateCount();
}

function buildRow(r, idx) {
  const cells = COLS.map(col => {
    let val = r[col] || '';
    const wrap = (col==='주소'||col==='품목1'||col==='비고') ? ' wrap' : '';

    if (col === '_date') {
      return `<td><span class="badge badge-date">${val}</span></td>`;
    }
    if (col === '수거일자') {
      val = val
        ? `<span class="badge badge-done">✅ ${val}</span>`
        : `<span class="badge badge-none">미수거</span>`;
    }
    if (col === '입금일자') {
      val = val
        ? `<span class="badge badge-done">💰 ${val}</span>`
        : `<span class="badge badge-wait">미입금</span>`;
    }
    return `<td class="${wrap}" data-col="${col}">${val}</td>`;
  });
  return `<tr data-idx="${idx}">${cells.join('')}</tr>`;
}

// ══ 전체 데이터 (날짜·탭 무시) ══
function getAllRows() {
  const rows = [];
  Object.keys(allData).sort().forEach(d => {
    KEEP_SHEETS.forEach(s => {
      (allData[d]?.[s] || []).forEach(r => rows.push({...r, _sheet: s}));
    });
  });
  return rows;
}

// ══ 검색 ══
function doSearch() {
  curSearch = document.getElementById('search-input').value.trim().toLowerCase();
  if (curSearch) {
    // 통합 검색 모드: 날짜·탭 무관하게 전체 데이터 검색
    renderSearchResults(curSearch);
  } else {
    // 검색 해제 → 일반 탭 뷰로 복귀
    renderTabs();
  }
  updateCount();
}

function renderSearchResults(q) {
  // 탭/날짜필터 숨기고 통합 결과 표시
  document.getElementById('tab-wrap').style.display = 'none';
  document.getElementById('filter-wrap').style.display = 'none';

  const box = document.getElementById('table-box');
  const allRows = getAllRows();

  // 검색 필터
  const SEARCH_COLS = ['성명','주소','전화번호','품목1','품목2','수거원','비고','접수일자','입금일자','수거일자'];
  const matched = allRows.filter(r =>
    SEARCH_COLS.some(c => String(r[c]||'').toLowerCase().includes(q))
  );

  if (!matched.length) {
    box.innerHTML = `<div class="empty">
      <div class="empty-icon">🔍</div>
      <div class="empty-text">"${q}" 검색 결과가 없습니다</div>
      <div class="empty-sub">누적된 전체 원장(${allRows.length}건)에서 검색했습니다</div>
    </div>`;
    updateCount();
    return;
  }

  // COLS에 시트명 컬럼 추가
  const SCOLS = ['_sheet','_date','연번','접수일자','주소','성명','전화번호',
    '품목1','금액1','품목2','금액2','총금액','입금일자','수거일자','수거원','비고'];
  const SLABELS = {'_sheet':'구분','_date':'원장날짜','연번':'연번','접수일자':'접수일',
    '주소':'주소','성명':'성명','전화번호':'전화번호','품목1':'품목1','금액1':'금액1',
    '품목2':'품목2','금액2':'금액2','총금액':'총금액','입금일자':'입금일자',
    '수거일자':'수거일자','수거원':'수거원','비고':'비고'};

  const thead = `<thead><tr>${SCOLS.map(c=>`<th>${SLABELS[c]}</th>`).join('')}</tr></thead>`;
  const tbody = matched.map((r,i) => {
    const cells = SCOLS.map(col => {
      let val = r[col] || '';
      const wrap = (col==='주소'||col==='품목1'||col==='비고') ? ' wrap' : '';
      if (col === '_sheet') {
        const colors = {'잠실본동':'var(--blue)','삼전동':'var(--green)','아파트':'var(--purple)'};
        const bgColors = {'잠실본동':'var(--blue-l)','삼전동':'var(--green-l)','아파트':'var(--purple-l)'};
        return `<td><span class="badge" style="background:${bgColors[val]||'var(--gray-l)'};color:${colors[val]||'var(--gray)'}">${val}</span></td>`;
      }
      if (col === '_date') return `<td><span class="badge badge-date">${val}</span></td>`;
      if (col === '수거일자') {
        val = val ? `<span class="badge badge-done">✅ ${val}</span>` : `<span class="badge badge-none">미수거</span>`;
      }
      if (col === '입금일자') {
        val = val ? `<span class="badge badge-done">💰 ${val}</span>` : `<span class="badge badge-wait">미입금</span>`;
      }
      // 하이라이트
      if (typeof val === 'string' && !val.includes('<span')) {
        const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
        val = val.replace(re, '<mark>$1</mark>');
      }
      return `<td class="${wrap}">${val}</td>`;
    });
    return `<tr>${cells.join('')}</tr>`;
  }).join('');

  box.innerHTML = `<table><thead>${thead}</thead><tbody id="tbody">${tbody}</tbody></table>`;
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  curSearch = '';
  // 탭·날짜필터 다시 표시
  const hasDates = Object.keys(allData).length > 0;
  document.getElementById('tab-wrap').style.display = hasDates ? '' : 'none';
  document.getElementById('filter-wrap').style.display = hasDates ? '' : 'none';
  renderTabs();
  updateCount();
}

function updateCount() {
  const el = document.getElementById('result-count');
  if (curSearch) {
    const tbody = document.getElementById('tbody');
    const visible = tbody ? tbody.querySelectorAll('tr').length : 0;
    const total = getAllRows().length;
    el.textContent = `🔍 통합검색: ${visible}건 찾음 / 전체 누적 ${total}건`;
    el.style.color = visible > 0 ? 'var(--green)' : 'var(--red)';
  } else {
    const tbody = document.getElementById('tbody');
    const cnt = tbody ? tbody.querySelectorAll('tr').length : 0;
    el.textContent = cnt ? `전체 ${cnt}건` : '';
    el.style.color = 'var(--gray)';
  }
}

// ══ 전체 초기화 ══
function confirmReset() {
  if (!confirm('누적된 모든 원장 데이터를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) return;
  allData = {};
  selectedFileDates.clear();
  curDateFilter = 'all';
  localStorage.removeItem(STORAGE_KEY);
  renderAll();
  showToast('🗑 전체 데이터가 초기화되었습니다');
}

// ══ 토스트 ══
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}
</script>

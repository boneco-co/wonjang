<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대형폐기물 원장 조회</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --blue:#1a56db; --blue-l:#e8f0fe; --blue-d:#1344b8;
  --red:#dc2626; --red-l:#fee2e2;
  --green:#16a34a; --green-l:#dcfce7;
  --yellow:#d97706; --yellow-l:#fef3c7;
  --gray:#6b7280; --gray-l:#f3f4f6;
  --border:#e5e7eb; --text:#111827; --white:#fff;
  --font:'Noto Sans KR',-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:#f0f4f8;color:var(--text);min-height:100vh;}

/* 헤더 */
.hdr{background:var(--blue);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.hdr-title{font-size:20px;font-weight:900;color:#fff;display:flex;align-items:center;gap:8px;}
.hdr-date{font-size:13px;color:rgba(255,255,255,.8);}

/* 업로드 영역 */
.upload-wrap{max-width:900px;margin:30px auto;padding:0 16px;}
.drop-zone{
  border:3px dashed var(--border);border-radius:16px;
  background:var(--white);padding:40px 20px;text-align:center;
  cursor:pointer;transition:all .2s;
}
.drop-zone:hover,.drop-zone.drag{border-color:var(--blue);background:var(--blue-l);}
.dz-icon{font-size:48px;margin-bottom:12px;}
.dz-title{font-size:18px;font-weight:700;margin-bottom:6px;}
.dz-sub{font-size:13px;color:var(--gray);}
.dz-btn{
  display:inline-block;margin-top:16px;padding:11px 28px;
  background:var(--blue);color:#fff;border-radius:10px;
  font-size:15px;font-weight:700;cursor:pointer;border:none;
  font-family:var(--font);
}
.dz-btn:hover{background:var(--blue-d);}
#file-input{display:none;}

/* 파일 정보 */
.file-info{
  display:none;background:var(--green-l);border:1.5px solid var(--green);
  border-radius:10px;padding:12px 16px;margin-top:12px;
  font-size:14px;color:var(--green);font-weight:700;
  display:none;align-items:center;gap:8px;
}

/* 검색 */
.search-wrap{max-width:1400px;margin:0 auto 16px;padding:0 16px;}
.search-box{
  display:flex;gap:10px;align-items:center;
  background:var(--white);border-radius:12px;
  padding:12px 16px;box-shadow:0 2px 8px rgba(0,0,0,.08);
  flex-wrap:wrap;
}
.search-input{
  flex:1;min-width:200px;border:1.5px solid var(--border);border-radius:8px;
  padding:10px 14px;font-size:15px;font-family:var(--font);outline:none;
}
.search-input:focus{border-color:var(--blue);}
.search-clear{
  padding:10px 16px;background:var(--gray-l);border:none;
  border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;
  font-family:var(--font);color:var(--gray);
}
.search-clear:hover{background:var(--border);}
.result-count{font-size:13px;color:var(--gray);white-space:nowrap;}

/* 탭 */
.tab-wrap{max-width:1400px;margin:0 auto;padding:0 16px;}
.tabs{display:flex;gap:6px;margin-bottom:0;}
.tab{
  padding:10px 22px;border-radius:10px 10px 0 0;border:none;
  font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;
  background:rgba(255,255,255,.5);color:var(--gray);transition:all .15s;
}
.tab.on{background:var(--white);color:var(--blue);box-shadow:0 -2px 8px rgba(0,0,0,.08);}
.tab-badge{
  display:inline-block;margin-left:6px;padding:1px 7px;
  border-radius:10px;background:var(--blue-l);color:var(--blue);font-size:11px;
}
.tab.on .tab-badge{background:var(--blue);color:#fff;}

/* 테이블 래퍼 */
.table-wrap{max-width:1400px;margin:0 auto;padding:0 16px 40px;}
.table-box{
  background:var(--white);border-radius:0 12px 12px 12px;
  box-shadow:0 2px 12px rgba(0,0,0,.08);overflow:auto;
}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{background:var(--blue);color:#fff;}
thead th{
  padding:11px 12px;text-align:center;white-space:nowrap;
  font-weight:700;font-size:12px;position:sticky;top:0;z-index:5;
}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:nth-child(even){background:#fafafa;}
tbody tr:hover{background:var(--blue-l);}
tbody tr.hidden{display:none;}
tbody tr.highlight{background:#fff3cd;}
td{padding:9px 12px;vertical-align:middle;white-space:nowrap;}
td.wrap{white-space:normal;min-width:100px;max-width:180px;}

/* 상태 뱃지 */
.badge{
  display:inline-block;padding:2px 8px;border-radius:10px;
  font-size:11px;font-weight:700;white-space:nowrap;
}
.badge-done{background:var(--green-l);color:var(--green);}
.badge-wait{background:var(--yellow-l);color:var(--yellow);}
.badge-none{background:var(--gray-l);color:var(--gray);}

/* 검색 하이라이트 */
mark{background:#fef08a;border-radius:2px;padding:0 2px;}

/* 빈 상태 */
.empty{text-align:center;padding:60px 20px;color:var(--gray);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-text{font-size:16px;font-weight:700;}
.empty-sub{font-size:13px;margin-top:6px;}

/* 통계 바 */
.stats-bar{
  display:flex;gap:10px;flex-wrap:wrap;
  max-width:1400px;margin:16px auto 12px;padding:0 16px;
}
.stat-card{
  background:var(--white);border-radius:10px;padding:10px 18px;
  box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;align-items:center;gap:10px;
}
.stat-n{font-size:22px;font-weight:900;color:var(--blue);}
.stat-l{font-size:12px;color:var(--gray);}

/* 반응형 */
@media(max-width:600px){
  .hdr-title{font-size:16px;}
  .tab{padding:8px 14px;font-size:12px;}
  table{font-size:12px;}
  td,thead th{padding:7px 8px;}
}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="hdr">
  <div class="hdr-title">📋 대형폐기물 원장 조회</div>
  <div class="hdr-date" id="hdr-date"></div>
</div>

<!-- 업로드 -->
<div class="upload-wrap">
  <div class="drop-zone" id="drop-zone">
    <div class="dz-icon">📂</div>
    <div class="dz-title">매일 아침 원장 파일을 여기에 올려주세요</div>
    <div class="dz-sub">파일을 드래그하거나 아래 버튼을 클릭하세요 (.xlsx, .xls)</div>
    <button class="dz-btn" onclick="document.getElementById('file-input').click()">📁 파일 선택</button>
    <input type="file" id="file-input" accept=".xlsx,.xls">
  </div>
  <div class="file-info" id="file-info">
    <span>✅</span><span id="file-info-text"></span>
  </div>
</div>

<!-- 검색 -->
<div class="search-wrap" id="search-wrap" style="display:none;">
  <div class="search-box">
    <input type="text" class="search-input" id="search-input"
      placeholder="🔍  이름 · 주소 · 전화번호 · 품목 검색 (Ctrl+F 대신 여기서 바로 검색!)"
      oninput="doSearch()">
    <button class="search-clear" onclick="clearSearch()">✕ 초기화</button>
    <span class="result-count" id="result-count"></span>
  </div>
</div>

<!-- 통계 -->
<div class="stats-bar" id="stats-bar" style="display:none;"></div>

<!-- 탭 -->
<div class="tab-wrap" id="tab-wrap" style="display:none;">
  <div class="tabs" id="tabs"></div>
</div>

<!-- 테이블 -->
<div class="table-wrap" id="table-wrap" style="display:none;">
  <div class="table-box" id="table-box">
    <div class="empty">
      <div class="empty-icon">📂</div>
      <div class="empty-text">파일을 업로드하면 여기에 표시됩니다</div>
    </div>
  </div>
</div>

<script>
// ── 설정: 유지할 시트 이름 ──
const KEEP_SHEETS = ['잠실본동', '삼전동', '아파트'];

// ── 컬럼 헤더 정의 ──
const HEADERS = ['연번','접수자','접수일자','주소','성명','전화번호',
  '품목1','금액1','품목2','금액2','품목3','금액3',
  '총금액','입금일자','수거일자','수거원/확인','비고'];

let allData = {};   // { 시트명: [{...행데이터}] }
let curTab = '';
let curSearch = '';

// ── 날짜 표시 ──
const now = new Date();
document.getElementById('hdr-date').textContent =
  `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일`;

// ── 파일 업로드 이벤트 ──
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
});
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) processFile(e.target.files[0]);
});

// ── 엑셀 파일 처리 ──
function processFile(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const wb = XLSX.read(e.target.result, { type: 'binary', cellDates: true });

    // 파일 정보 표시
    const fi = document.getElementById('file-info');
    fi.style.display = 'flex';
    document.getElementById('file-info-text').textContent =
      `"${file.name}" 업로드 완료 — ${KEEP_SHEETS.join(', ')} 시트 로드됨`;

    allData = {};

    KEEP_SHEETS.forEach(sheetName => {
      if (!wb.SheetNames.includes(sheetName)) return;
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, {
        header: 1, defval: '', raw: false,
        dateNF: 'yyyy-mm-dd'
      });

      // 실제 데이터는 4행부터, 짝수 행이 메인 데이터
      const data = [];
      for (let i = 3; i < rows.length; i += 2) {
        const r = rows[i];
        // 성명 또는 주소가 있는 행만 포함
        const name = String(r[4] || '').trim();
        const addr = String(r[3] || '').trim();
        if (!name && !addr) continue;

        // 날짜 포맷 정리
        const fmtDate = v => {
          if (!v) return '';
          const s = String(v);
          if (s.includes('-') || s.includes('/')) return s.slice(0, 10);
          return s;
        };

        data.push({
          연번:    String(r[0] || '').trim(),
          접수자:  String(r[1] || '').trim(),
          접수일자: fmtDate(r[2]),
          주소:    addr,
          성명:    name,
          전화번호: String(r[5] || '').trim(),
          품목1:   String(r[6] || '').trim(),
          금액1:   String(r[7] || '').trim(),
          품목2:   String(r[8] || '').trim(),
          금액2:   String(r[9] || '').trim(),
          품목3:   String(r[10] || '').trim(),
          금액3:   String(r[11] || '').trim(),
          총금액:  String(r[12] || '').trim(),
          입금일자: fmtDate(r[13]),
          수거일자: fmtDate(r[14]),
          수거원:  String(r[15] || '').trim(),
          비고:    String(r[16] || '').trim(),
        });
      }
      allData[sheetName] = data;
    });

    // UI 표시
    renderTabs();
    renderStats();
    document.getElementById('search-wrap').style.display = '';
    document.getElementById('stats-bar').style.display = '';
    document.getElementById('tab-wrap').style.display = '';
    document.getElementById('table-wrap').style.display = '';
    document.getElementById('search-input').focus();
  };
  reader.readAsBinaryString(file);
}

// ── 탭 렌더 ──
function renderTabs() {
  const tabs = document.getElementById('tabs');
  const names = Object.keys(allData);
  if (!names.length) return;
  curTab = names[0];

  tabs.innerHTML = names.map(name => `
    <button class="tab ${name === curTab ? 'on' : ''}"
      onclick="switchTab('${name}')">
      ${name}
      <span class="tab-badge">${allData[name].length}</span>
    </button>
  `).join('');

  renderTable();
}

function switchTab(name) {
  curTab = name;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('on', t.textContent.trim().startsWith(name));
  });
  renderTable();
}

// ── 통계 바 ──
function renderStats() {
  const bar = document.getElementById('stats-bar');
  let totalAll = 0, totalPaid = 0, totalDone = 0;

  Object.values(allData).forEach(rows => {
    rows.forEach(r => {
      totalAll++;
      if (r.입금일자) totalPaid++;
      if (r.수거일자) totalDone++;
    });
  });

  bar.innerHTML = `
    <div class="stat-card">
      <div class="stat-n">${totalAll}</div>
      <div class="stat-l">전체 건수</div>
    </div>
    <div class="stat-card">
      <div class="stat-n" style="color:var(--green)">${totalPaid}</div>
      <div class="stat-l">입금 완료</div>
    </div>
    <div class="stat-card">
      <div class="stat-n" style="color:var(--blue)">${totalDone}</div>
      <div class="stat-l">수거 완료</div>
    </div>
    <div class="stat-card">
      <div class="stat-n" style="color:var(--red)">${totalAll - totalDone}</div>
      <div class="stat-l">수거 미완료</div>
    </div>
  `;
}

// ── 테이블 렌더 ──
function renderTable() {
  const box = document.getElementById('table-box');
  const rows = allData[curTab] || [];

  if (!rows.length) {
    box.innerHTML = `<div class="empty">
      <div class="empty-icon">🗂</div>
      <div class="empty-text">데이터가 없습니다</div>
    </div>`;
    return;
  }

  const cols = ['연번','접수자','접수일자','주소','성명','전화번호',
    '품목1','금액1','품목2','금액2','총금액','입금일자','수거일자','수거원','비고'];

  const thead = `<thead><tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr></thead>`;
  const tbody = `<tbody id="tbody">${rows.map((r, i) => buildRow(r, i, cols)).join('')}</tbody>`;

  box.innerHTML = `<table>${thead}${tbody}</table>`;
  applySearch(curSearch);
  updateCount();
}

function buildRow(r, idx, cols) {
  const isPaid = !!r.입금일자;
  const isDone = !!r.수거일자;
  const rowClass = !isPaid ? 'row-wait' : !isDone ? 'row-paid' : '';

  const cells = cols.map(col => {
    let val = r[col] || '';
    // 금액 포맷
    if ((col === '금액1'||col==='금액2'||col==='총금액') && val) {
      const n = parseFloat(val.replace(/,/g,''));
      if (!isNaN(n)) val = n.toLocaleString() + '원';
    }
    // 수거일자 뱃지
    if (col === '수거일자') {
      if (val) val = `<span class="badge badge-done">✅ ${val}</span>`;
      else val = `<span class="badge badge-none">미수거</span>`;
    }
    // 입금일자 뱃지
    if (col === '입금일자') {
      if (val) val = `<span class="badge badge-done">💰 ${val}</span>`;
      else val = `<span class="badge badge-wait">미입금</span>`;
    }
    const wrap = (col==='주소'||col==='품목1'||col==='비고') ? ' wrap' : '';
    return `<td class="${wrap}" data-col="${col}">${val}</td>`;
  });

  return `<tr data-idx="${idx}">${cells.join('')}</tr>`;
}

// ── 검색 ──
function doSearch() {
  curSearch = document.getElementById('search-input').value.trim().toLowerCase();
  applySearch(curSearch);
  updateCount();
}

function applySearch(q) {
  const tbody = document.getElementById('tbody');
  if (!tbody) return;
  tbody.querySelectorAll('tr').forEach(tr => {
    if (!q) {
      tr.classList.remove('hidden', 'highlight');
      tr.querySelectorAll('td').forEach(td => {
        td.innerHTML = td.innerHTML.replace(/<mark>(.*?)<\/mark>/gi, '$1');
      });
      return;
    }
    const text = tr.textContent.toLowerCase();
    const match = text.includes(q);
    tr.classList.toggle('hidden', !match);
    tr.classList.toggle('highlight', match);

    // 하이라이트
    tr.querySelectorAll('td').forEach(td => {
      const raw = td.innerHTML.replace(/<mark>(.*?)<\/mark>/gi, '$1');
      if (match && !td.querySelector('.badge')) {
        const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
        td.innerHTML = raw.replace(re, '<mark>$1</mark>');
      } else {
        td.innerHTML = raw;
      }
    });
  });
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  curSearch = '';
  applySearch('');
  updateCount();
}

function updateCount() {
  const tbody = document.getElementById('tbody');
  const cntEl = document.getElementById('result-count');
  if (!tbody) { cntEl.textContent = ''; return; }
  const total = tbody.querySelectorAll('tr').length;
  const visible = tbody.querySelectorAll('tr:not(.hidden)').length;
  if (curSearch) {
    cntEl.textContent = `검색 결과: ${visible}건 / 전체 ${total}건`;
    cntEl.style.color = visible > 0 ? 'var(--green)' : 'var(--red)';
  } else {
    cntEl.textContent = `전체 ${total}건`;
    cntEl.style.color = 'var(--gray)';
  }
}
</script>
</body>
</html>
